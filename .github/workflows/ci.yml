name: Fortimove CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # 1. Lint & Type Check
  # ============================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff

      - name: Run Ruff (pm-agent)
        run: ruff check pm-agent/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Run Ruff (daily-scout)
        run: ruff check daily-scout/ --select E,W,F --ignore E501
        continue-on-error: true

      - name: Run Ruff (image-localization backend)
        run: ruff check image-localization-system/backend/ --select E,W,F --ignore E501
        continue-on-error: true

  # ============================================================
  # 2. PM Agent Tests
  # ============================================================
  test-pm-agent:
    name: PM Agent Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pm-${{ hashFiles('pm-agent/requirements.txt') }}

      - name: Install dependencies
        working-directory: pm-agent
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        working-directory: pm-agent
        env:
          ALLOW_LOCAL_NOAUTH: "true"
          CLAUDE_MODEL: "claude-sonnet-4-5-20250929"
        run: |
          python -m pytest test_approval_queue.py test_review_workflow.py test_auth_hardening.py -v --tb=short 2>&1 || true

  # ============================================================
  # 3. Korean Law MCP Build
  # ============================================================
  build-korean-law-mcp:
    name: Korean Law MCP Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-mcp-${{ hashFiles('korean-law-mcp/package-lock.json') }}

      - name: Install & Build
        working-directory: korean-law-mcp
        run: |
          npm ci
          npm run build

  # ============================================================
  # 4. Docker Build (image-localization-system)
  # ============================================================
  build-docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test-pm-agent, build-korean-law-mcp]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        working-directory: image-localization-system
        run: docker build -t fortimove-backend:test ./backend

      - name: Build frontend image
        working-directory: image-localization-system
        run: docker build -t fortimove-frontend:test ./frontend

  # ============================================================
  # 5. Security Scan
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Check for hardcoded API keys
          if grep -rn "sk-ant-api" --include="*.py" --include="*.ts" --include="*.js" --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=__pycache__ .; then
            echo "::error::Hardcoded API keys found in source code!"
            exit 1
          fi

      - name: Check .env not tracked
        run: |
          if git ls-files --cached | grep -E '\.env$'; then
            echo "::error::.env files should not be tracked by git!"
            exit 1
          fi
