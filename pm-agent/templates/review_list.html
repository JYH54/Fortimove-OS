<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review List - PM Agent Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/console.css">
</head>
<body>
    <!-- 통합 네비게이션 -->
    <nav class="navbar navbar-expand navbar-dark" style="background:#1a1a2e;height:48px;">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/" style="color:#e94560;font-weight:900;">FORTIMOVE GLOBAL</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/workbench">워크벤치</a>
                <a class="nav-link" href="/">홈</a>
                <a class="nav-link" href="/coo">COO 브리핑</a>
                <a class="nav-link active" href="/review/list">리뷰</a>
                <a class="nav-link" href="/redesign/queue">상세페이지</a>
                <a class="nav-link" href="/agents">에이전트</a>
                <a class="nav-link" href="/bi">BI &amp; FinOps</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <!-- Filters & Sort -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold">상태 필터</label>
                <select id="statusFilter" class="form-select">
                    <option value="">전체</option>
                    <option value="draft">초안</option>
                    <option value="under_review">검토 중</option>
                    <option value="approved_for_export">승인됨</option>
                    <option value="hold">보류</option>
                    <option value="rejected">거부</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">검색</label>
                <input type="text" id="searchInput" class="form-control" placeholder="상품명 또는 리뷰 ID로 검색...">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">정렬</label>
                <div class="btn-group w-100">
                    <button id="sortScoreBtn" class="btn btn-outline-primary active">점수 ↓</button>
                    <button id="sortDateBtn" class="btn btn-outline-primary">날짜 ↓</button>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button id="refreshBtn" class="btn btn-primary w-100">🔄 새로고침</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="row mb-3">
            <div class="col">
                <div class="alert alert-info mb-0">
                    <strong>전체:</strong> <span id="totalCount">0</span>개
                    | <strong>대기 중:</strong> <span id="pendingCount">0</span>개
                    | <strong>승인됨:</strong> <span id="approvedCount">0</span>개
                </div>
            </div>
        </div>

        <!-- Review List Table -->
        <div class="table-responsive">
            <table class="table table-hover table-sm">
                <thead class="table-dark">
                    <tr>
                        <th>리뷰 ID</th>
                        <th>상품명</th>
                        <th>점수</th>
                        <th>판정</th>
                        <th>상태</th>
                        <th>수정일</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="reviewListBody">
                    <tr>
                        <td colspan="9" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/review_list.js?v=20260401-2"></script>
</body>
</html>
