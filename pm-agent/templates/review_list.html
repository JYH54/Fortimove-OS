<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review List - PM Agent Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/console.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <div>
                <a href="/" class="btn btn-sm btn-outline-light me-2">🏠 운영 대시보드</a>
                <span class="navbar-brand mb-0 h1">Review Console</span>
            </div>
            <span class="navbar-text text-white">Phase 4 - Review-First Publishing</span>
        </div>
    </nav>

    <div class="container-fluid">
        <!-- Filters & Sort -->
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold">상태 필터</label>
                <select id="statusFilter" class="form-select">
                    <option value="">전체</option>
                    <option value="draft">초안</option>
                    <option value="under_review">검수 중</option>
                    <option value="approved_for_export">내보내기 승인</option>
                    <option value="approved_for_upload">업로드 승인</option>
                    <option value="hold">보류</option>
                    <option value="rejected">거부</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">검색</label>
                <input type="text" id="searchInput" class="form-control" placeholder="상품명 또는 리뷰 ID로 검색...">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">정렬</label>
                <div class="btn-group w-100">
                    <button id="sortScoreBtn" class="btn btn-outline-primary active">점수 ↓</button>
                    <button id="sortDateBtn" class="btn btn-outline-primary">날짜 ↓</button>
                </div>
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button id="refreshBtn" class="btn btn-primary w-100">🔄 새로고침</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="row mb-3">
            <div class="col">
                <div class="alert alert-info mb-0">
                    <strong>전체:</strong> <span id="totalCount">0</span>개
                    | <strong>대기 중:</strong> <span id="pendingCount">0</span>개
                    | <strong>승인됨:</strong> <span id="approvedCount">0</span>개
                </div>
            </div>
        </div>

        <!-- Review List Table -->
        <div class="table-responsive">
            <table class="table table-hover table-sm">
                <thead class="table-dark">
                    <tr>
                        <th>리뷰 ID</th>
                        <th>상품명</th>
                        <th>점수</th>
                        <th>판정</th>
                        <th>상태</th>
                        <th>대표 이미지</th>
                        <th>내보내기 가능</th>
                        <th>수정일</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="reviewListBody">
                    <tr>
                        <td colspan="9" class="text-center">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/review_list.js?v=20260401-2"></script>
</body>
</html>
