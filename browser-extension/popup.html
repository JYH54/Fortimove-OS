<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FORTIMOVE Sourcing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            width: 380px;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 13px;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px;
            border-bottom: 2px solid #e94560;
        }
        .header h1 { color: #e94560; font-size: 16px; font-weight: 900; }
        .header .sub { color: #8b949e; font-size: 11px; margin-top: 2px; }

        .content { padding: 16px; }

        .platform-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(88, 166, 255, 0.15);
            color: #58a6ff;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            padding: 6px 0;
            border-bottom: 1px solid #30363d;
            font-size: 12px;
            gap: 8px;
        }
        .info-row:last-child { border: none; }
        .info-row .label {
            color: #8b949e;
            min-width: 55px;
            font-weight: 600;
        }
        .info-row .value {
            flex: 1;
            color: #fff;
            word-break: break-word;
        }

        .image-preview {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 8px 0;
            margin-top: 8px;
        }
        .image-preview img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #30363d;
            flex-shrink: 0;
        }

        .options {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin: 12px 0;
        }
        .options label {
            display: block;
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .options select, .options input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .options .row { display: flex; gap: 8px; }
        .options .row > div { flex: 1; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover { background: #d63e57; }
        .btn-primary:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        .status {
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .status.show { display: block; }
        .status.loading { background: rgba(88,166,255,.1); color: #58a6ff; }
        .status.success { background: rgba(63,185,80,.1); color: #3fb950; }
        .status.error { background: rgba(218,54,51,.1); color: #da3633; }

        .settings-link {
            display: block;
            text-align: center;
            color: #8b949e;
            font-size: 11px;
            margin-top: 12px;
            text-decoration: none;
            padding: 8px;
        }
        .settings-link:hover { color: #58a6ff; }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FORTIMOVE Sourcing</h1>
        <div class="sub">상품 페이지에서 워크벤치로 바로 전송</div>
    </div>

    <div class="content">
        <div id="loading" class="empty">
            상품 정보 추출 중...
        </div>

        <div id="notSupported" class="empty" style="display:none;">
            지원되지 않는 페이지입니다.<br>
            <span style="font-size:10px;">iHerb, Amazon, Taobao, 1688, Tmall, Rakuten 지원</span>
        </div>

        <div id="productInfo" style="display:none;">
            <div class="platform-badge" id="platform">-</div>

            <div class="info-row">
                <div class="label">제목</div>
                <div class="value" id="title">-</div>
            </div>
            <div class="info-row">
                <div class="label">브랜드</div>
                <div class="value" id="brand">-</div>
            </div>
            <div class="info-row">
                <div class="label">카테고리</div>
                <div class="value" id="category">-</div>
            </div>
            <div class="info-row">
                <div class="label">가격</div>
                <div class="value" id="price">-</div>
            </div>
            <div class="info-row">
                <div class="label">이미지</div>
                <div class="value" id="imgCount">-</div>
            </div>

            <div class="image-preview" id="imagePreview"></div>

            <div class="options">
                <label>카테고리 선택</label>
                <select id="catSelect">
                    <option value="supplement">영양제/보충제</option>
                    <option value="wellness">건강기능식품</option>
                    <option value="beauty">뷰티</option>
                    <option value="fitness">운동용품</option>
                    <option value="food">식품</option>
                    <option value="general">일반</option>
                </select>

                <div class="row">
                    <div>
                        <label>원가 (현지)</label>
                        <input type="number" id="srcPrice" placeholder="0" step="0.01">
                    </div>
                    <div>
                        <label>무게 (kg)</label>
                        <input type="number" id="srcWeight" value="0.5" step="0.1">
                    </div>
                </div>

                <label>분석 모드</label>
                <select id="workflow">
                    <option value="quick_sourcing_check">빠른 검증 (소싱+마진)</option>
                    <option value="full_product_registration">전체 등록</option>
                </select>
            </div>

            <button class="btn btn-primary" id="sendBtn">
                워크벤치로 전송 & 분석 시작
            </button>
        </div>

        <div class="status" id="status"></div>

        <a href="#" class="settings-link" id="openWorkbench">워크벤치 열기 →</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
